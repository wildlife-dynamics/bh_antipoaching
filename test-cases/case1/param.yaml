# Bahari Hai — param.yaml for Desktop App
# ══════════════════════════════════════════════════════════════════════════════

workflow_details:
  name: "Antipoaching Patrol Summary"

time_range:
  timezone:
    label: UTC
    tzCode: UTC
    name: UTC
    utc: '+03:00'
  time_format: '%d %b %Y %H:%M:%S'
  since: '2024-01-01T17:59:00.000Z'
  until: '2024-12-31T17:59:00.000Z'

# groupers drives the dashboard filter selector.
# Default: Year only — gives one group per year, so split_data produces
# one subset per year and mapvalues tasks each run once per year.
# Users can change this in the desktop UI to Month or Quarter for finer splits.
groupers:
  groupers:
    - index_name: Year

