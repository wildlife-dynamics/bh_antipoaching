    id: ecograph_map
    task: draw_ecograph_map
    partial:
      groupers: ${{ workflow.groupers.return }}
      marine_layers_path: ${{ workflow.marine_layers_input.return }}
      widget_id: Ecograph Patrol Effort Map
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_data.return }}

  - name: Persist ecograph map HTML
    id: persist_ecograph_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: ecograph_map
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.ecograph_map.return }}

  - name: Convert ecograph map HTML to PNG
    id: html_to_png_ecograph_map
    task: html_to_png
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 1400
        # height: 900
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 60000
        timeout: 0
        max_concurrent_pages: 1
    mapvalues:
      argnames: html_path
      argvalues: ${{ workflow.persist_ecograph_html.return }}

  - name: Create ecograph map widget
    id: ecograph_map_widget
    task: create_map_widget_single_view
    partial:
      title: Ecograph Patrol Effort Map
    mapvalues:
      argnames: data
      argvalues: ${{ workflow.persist_ecograph_html.return }}

