id: bh_antipoaching

requirements:
  - name: ecoscope-workflows-core
    version: ">=0.19.4"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-ecoscope
    version: ">=0.19.4"
    channel: https://repo.prefix.dev/ecoscope-workflows/

  - name: ecoscope-workflows-ext-custom
    version: "0.0.28.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-ste
    version: "0.0.18.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: ecoscope-workflows-ext-bahari-hai
    version: "0.0.17.*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/

  - name: pandas
    version: ">=1.5.0"
    channel: conda-forge

  - name: pandera
    version: "0.26.0"
    channel: conda-forge

  - name: geopandas
    version: ">=0.13.0"
    channel: conda-forge

  - name: fiona
    version: ">=1.9.0"
    channel: conda-forge

rjsf-overrides:
  $defs:
    ValueGrouper.properties.index_name.oneOf:
      - const: Year
        title: Year
      - const: Month
        title: Month
      - const: Quarter
        title: Quarter
    # Lock grouper type to ValueGrouper only — prevents desktop UI
    # from offering TemporalGrouper which would look for a non-existent column
    Grouper.oneOf:
      - $ref: '#/$defs/ValueGrouper'

workflow:

  - name: Set Workflow Details
    id: workflow_details
    task: set_workflow_details

  - name: Define analysis time range
    id: time_range
    task: set_time_range

  # ── Inputs ────────────────────────────────────────────────
  - name: CSV input
    id: csv_input
    task: fetch_and_persist_file
    partial:
      url: https://raw.githubusercontent.com/wildlife-dynamics/wt-bh-village-games/ae1f5bfb247c0bdde169caaaaf4e5c96cafb6b75/data/patrol_findings_with_village.csv
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      unzip: false
      retries: 3
      overwrite_existing: false

  - name: Load bh data from CSV
    id: load_data
    task: load_df
    partial:
      file_path: ${{ workflow.csv_input.return }}
      layer: landDx_polygons
      deserialize_json: false

  - name: Marine layers path
    id: marine_layers_input
    task: fetch_and_persist_file
    partial:
      url: https://drive.google.com/uc?export=download&id=1pNu0xS9lMN-O4SPpSiBihYcUTOGwN5_H
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      unzip: true
      retries: 3
      overwrite_existing: false

  - name: Report template path
    id: report_template_input
    task: fetch_and_persist_file
    partial:
      url: https://docs.google.com/document/d/1qqy2OdAL_RJirep78TlCOBxHL4e6W--5/export?format=docx
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      unzip: false
      retries: 3
      overwrite_existing: false

  # ── Data preparation ──────────────────────────────────────
  - name: Clean and prepare patrol data
    id: clean_data
    task: clean_dataframe
    partial:
      data: ${{ workflow.load_data.return }}
      date_columns:
        - "Patrol Start Date"
        - "Waypoint Date"
      date_format: "%d-%b-%y"
      groupby_period:
        - "Year"
        - "Month"
        - "Quarter"
      numeric_columns:
        - "X"
        - "Y"
      drop_duplicates: false

  # ── Groupers & split ──────────────────────────────────────
  # groupers drives the dashboard filter selector (Year / Month / Quarter).
  # split_data produces one (filter_key, dataframe) pair per group and is
  # fed to tasks whose dashboard widget should respond to that selector.
  - name: Define temporal groupers
    id: groupers
    task: set_groupers

  - name: Split data into temporal groups
    id: split_data
    task: split_groups
    partial:
      df: ${{ workflow.clean_data.return }}
      groupers: ${{ workflow.groupers.return }}

  # ════════════════════════════════════════════════════════════
  # SECTION 1 — PATROL SUMMARIES  (partial only — all-time data)
  # ════════════════════════════════════════════════════════════

  - name: Summarize patrols by year
    id: patrol_summaries_by_year
    task: summarize_patrols
    partial:
      df: ${{ workflow.clean_data.return }}

  - name: Create multi-year patrol summary table
    id: patrol_summary_table
    task: draw_table
    partial:
      dataframe: ${{ workflow.patrol_summaries_by_year.return }}
      columns:
        - "Year"
        - "patrols"
        - "hours"
        - "incidents"
      widget_id: Patrol summaries
      table_config:
        enable_sorting: true
        enable_filtering: false
        enable_download: false
        hide_header: false

  - name: Persist patrol summary table HTML
    id: persist_patrol_summary_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: patrol_summary
      text: ${{ workflow.patrol_summary_table.return }}

  - name: Convert patrol summary table HTML to PNG
    id: html_to_png_patrol_summary
    task: html_to_png
    partial:
      html_path: ${{ workflow.persist_patrol_summary_html.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 1200
        # height: 700
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1

  - name: Create patrol summary widget
    id: patrol_summary_widget
    task: create_table_widget_single_view
    partial:
      title: Patrol summaries
      data: ${{ workflow.persist_patrol_summary_html.return }}

  # ── Patrols per year line chart ───────────────────────────
  - name: Draw patrols per year chart
    id: patrols_line_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.patrol_summaries_by_year.return }}
      x_column: Year
      y_column: patrols
      category_column: null
      widget_id: Patrols per Year
      smoothing: null
      layout_kwargs:
        title: "Number of Patrols per Year"
        title_x: 0.5
        font_size: 12.0
        font_color: black
        font_family: Arial
        # height: 750
        # width: 1400
        yaxis:
          title: Number of Patrols
          tick_font_size: 8
          title_font_size: 10
        xaxis:
          title: Year
          tick_font_size: 8
          title_font_size: 10
          tickmode: linear
          dtick: 1
        margin:
          t: 120
          b: 80
          l: 80
          r: 40
      line_kwargs:
        color: "#2c3e50"
        width: 3
        shape: linear
        show_markers: true


  - name: Persist patrols chart HTML
    id: persist_patrols_chart_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: patrols_per_year
      text: ${{ workflow.patrols_line_chart.return }}

  - name: Convert patrols chart HTML to PNG
    id: html_to_png_patrols_chart
    task: html_to_png
    partial:
      html_path: ${{ workflow.persist_patrols_chart_html.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 1200
        # height: 700
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1

  - name: Create patrols chart widget
    id: patrols_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: Patrols per Year
      data: ${{ workflow.persist_patrols_chart_html.return }}

  # ── Patrol hours per year line chart ─────────────────────
  - name: Draw patrol hours per year chart
    id: hours_line_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.patrol_summaries_by_year.return }}
      x_column: Year
      y_column: hours
      category_column: null
      widget_id: Patrol Hours per Year
      smoothing: null
      layout_kwargs:
        title: "Patrol Hours per Year"
        title_x: 0.5
        font_size: 12.0
        font_color: black
        font_family: Arial
        # height: 750
        # width: 1400
        yaxis:
          title: Patrol Hours
          tick_font_size: 8
          title_font_size: 10
        xaxis:
          title: Year
          tick_font_size: 8
          title_font_size: 10
          tickmode: linear
          dtick: 1
        margin:
          t: 120
          b: 80
          l: 80
          r: 40
      line_kwargs:
        color: "#2c3e50"
        width: 3
        shape: linear
        show_markers: true

  - name: Persist hours chart HTML
    id: persist_hours_chart_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: patrol_hours_per_year
      text: ${{ workflow.hours_line_chart.return }}

  - name: Convert hours chart HTML to PNG
    id: html_to_png_hours_chart
    task: html_to_png
    partial:
      html_path: ${{ workflow.persist_hours_chart_html.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 1200
        # height: 700
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1

  - name: Create hours chart widget
    id: hours_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: Patrol Hours per Year
      data: ${{ workflow.persist_hours_chart_html.return }}

  # ── Incidents per year line chart ─────────────────────────
  - name: Draw incidents per year chart
    id: incidents_line_chart
    task: draw_line_chart
    partial:
      dataframe: ${{ workflow.patrol_summaries_by_year.return }}
      x_column: Year
      y_column: incidents
      category_column: null
      widget_id: Incidents per Year
      smoothing: null
      layout_kwargs:
        title: "Number of Incidents per Year"
        title_x: 0.5
        font_size: 12
        font_color: black
        font_family: Arial
        # height: 750
        # width: 1400
        yaxis:
          title: Number of Incidents
          tick_font_size: 8
          title_font_size: 10
        xaxis:
          title: Year
          tick_font_size: 8
          title_font_size: 10
          tickmode: linear
          dtick: 1
        margin:
          t: 120
          b: 80
          l: 80
          r: 40
      line_kwargs:
        color: "#2c3e50"
        width: 3
        shape: linear
        show_markers: true
        smoothing: false

  - name: Persist incidents chart HTML
    id: persist_incidents_chart_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: incidents_per_year
      text: ${{ workflow.incidents_line_chart.return }}

  - name: Convert incidents chart HTML to PNG
    id: html_to_png_incidents_chart
    task: html_to_png
    partial:
      html_path: ${{ workflow.persist_incidents_chart_html.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 1280
        # height: 720
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1

  - name: Create incidents chart widget
    id: incidents_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: Incidents per Year
      data: ${{ workflow.persist_incidents_chart_html.return }}

  # ── Village summary table (partial — aggregates all time) ─
  - name: Summarize patrols by village
    id: village_summaries
    task: summarize_by_village
    partial:
      df: ${{ workflow.clean_data.return }}
      groupers: ${{ workflow.groupers.return }}

  - name: Create village summary table
    id: village_summary_table
    task: draw_table
    partial:
      dataframe: ${{ workflow.village_summaries.return }}
      columns:
        - "Village"
        - "Number Of Patrols"
        - "Total Patrol Hours"
        - "Mangrove Logging"
        - "Poaching"
        - "Illegal Fishing"
        - "Damaging Coral"
        - "Arrests"
      widget_id: Village Patrol Summary
      table_config:
        enable_sorting: true
        enable_filtering: false
        enable_download: false
        hide_header: false

  - name: Persist village summary table HTML
    id: persist_village_summary_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: village_summary
      text: ${{ workflow.village_summary_table.return }}

  - name: Convert village summary table HTML to PNG
    id: html_to_png_village_summary
    task: html_to_png
    partial:
      html_path: ${{ workflow.persist_village_summary_html.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 1280
        # height: 720
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1

  - name: Create village summary widget
    id: village_summary_widget
    task: create_table_widget_single_view
    partial:
      title: Village Patrol Summary
      data: ${{ workflow.persist_village_summary_html.return }}

  # ════════════════════════════════════════════════════════════
  # SECTION 2 — PATROL EFFORT  (partial only — all-time data)
  # ════════════════════════════════════════════════════════════

  - name: Prepare patrol effort data
    id: patrol_effort_data
    task: prepare_pivot_summary
    partial:
      df: ${{ workflow.clean_data.return }}
      groupers: ${{ workflow.groupers.return }}
      pivot_column: "Patrol Transport Type"
      value_column: "Patrol ID"
      aggregation: "nunique"
      multiplier: 8.0
      pivot_values:
        - "Boat"
        - "Foot"
        - "Vehicle"
      station_column: "Station"
      station_filter: "Sector"

  - name: Draw patrol effort bar chart
    id: patrol_effort_chart
    task: draw_bar_chart
    partial:
      dataframe: ${{ workflow.patrol_effort_data.return }}
      category: Year
      bar_chart_configs:
        - column: Boat
          agg_func: sum
          label: Boat
        - column: Foot
          agg_func: sum
          label: Foot
        - column: Vehicle
          agg_func: sum
          label: Vehicle
      layout_kwargs:
        title: Patrol Effort by Transport Type
        title_x: 0.5
        font_size: 12
        font_color: black
        font_family: Arial
        # height: 750
        # width: 1400
        yaxis:
          title: Patrol Hours
          tick_font_size: 8
          title_font_size: 10
        xaxis:
          title: Period
          tick_font_size: 8
          title_font_size: 10
      widget_id: Patrol Effort by Transport Type

  - name: Persist patrol effort chart HTML
    id: persist_patrol_effort_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: patrol_effort
      text: ${{ workflow.patrol_effort_chart.return }}

  - name: Convert patrol effort chart HTML to PNG
    id: html_to_png_patrol_effort_chart
    task: html_to_png
    partial:
      html_path: ${{ workflow.persist_patrol_effort_html.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 1280
        # height: 720
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1

  - name: Create patrol effort widget
    id: patrol_effort_widget
    task: create_plot_widget_single_view
    partial:
      title: Patrol Effort by Transport Type
      data: ${{ workflow.persist_patrol_effort_html.return }}

  # ── Patrol transport summary charts ──────────────────────
  - name: Prepare patrol transport summary data
    id: patrol_transport_data
    task: prepare_grouped_summary
    partial:
      df: ${{ workflow.clean_data.return }}
      groupers: ${{ workflow.groupers.return }}
      group_column: "Patrol Transport Type"
      aggregations:
        Patrol Count: "Patrol ID:nunique"
      derived_columns:
        Patrol Hours: "Patrol Count * 8.0"
      group_values:
        - "Boat"
        - "Foot"
        - "Vehicle"
      station_column: "Station"
      station_filter: "Sector"
      most_recent_period_only: false

  - name: Draw patrol count by transport type chart
    id: patrol_transport_count_chart
    task: draw_bar_chart
    partial:
      dataframe: ${{ workflow.patrol_transport_data.return }}
      category: Patrol Transport Type
      bar_chart_configs:
        - column: Patrol Count
          agg_func: sum
          label: Count
          text: Patrol Count
          textposition: outside
          textfont_size: 12
      layout_kwargs:
        title: "Number of Patrols by Transport Type"
        title_x: 0.5
        font_size: 12
        font_color: black
        font_family: Arial
        # height: 700
        # width: 1200
        yaxis:
          title: Number of Patrols
          title_font_size: 10
          tick_font_size: 8
        xaxis:
          title: Transport Type
          title_font_size: 10
          tick_font_size: 8
        margin:
          t: 140
          b: 120
          l: 100
          r: 100
      widget_id: Patrol Count by Transport Type

  - name: Persist patrol count transport chart HTML
    id: persist_transport_count_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: transport_patrol_count
      text: ${{ workflow.patrol_transport_count_chart.return }}

  - name: Convert patrol count transport chart HTML to PNG
    id: png_transport_count_chart
    task: html_to_png
    partial:
      html_path: ${{ workflow.persist_transport_count_html.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 1280
        # height: 720
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1

  - name: Create patrol count transport widget
    id: patrol_transport_count_widget
    task: create_plot_widget_single_view
    partial:
      title: Patrol Count by Transport Type
      data: ${{ workflow.persist_transport_count_html.return }}

  - name: Draw patrol hours by transport type chart
    id: patrol_transport_hours_chart
    task: draw_bar_chart
    partial:
      dataframe: ${{ workflow.patrol_transport_data.return }}
      category: Patrol Transport Type
      bar_chart_configs:
        - column: Patrol Hours
          agg_func: sum
          label: Hours
          text: Patrol Hours
          textposition: outside
          textfont_size: 12
      layout_kwargs:
        title: "Number of patrol hours by transport type"
        title_x: 0.5
        font_size: 12
        font_color: black
        font_family: Arial
        # height: 700
        # width: 1200
        yaxis:
          title: Patrol Hours
          title_font_size: 10
          tick_font_size: 8
        xaxis:
          title: Transport Type
          title_font_size: 10
          tick_font_size: 8
        margin:
          t: 140
          b: 120
          l: 100
          r: 100
      widget_id: Patrol Hours by Transport Type

  - name: Persist patrol hours transport chart HTML
    id: persist_transport_hours_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: transport_patrol_hours
      text: ${{ workflow.patrol_transport_hours_chart.return }}

  - name: Convert patrol hours transport chart HTML to PNG
    id: png_transport_hours_chart
    task: html_to_png
    partial:
      html_path: ${{ workflow.persist_transport_hours_html.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 1280
        # height: 720
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1

  - name: Create patrol hours transport widget
    id: patrol_transport_hours_widget
    task: create_plot_widget_single_view
    partial:
      title: Patrol Hours by Transport Type
      data: ${{ workflow.persist_transport_hours_html.return }}

  # ════════════════════════════════════════════════════════════
  # SECTION 3 — ILLEGAL ACTIVITY  (partial — all-time summary)
  # ════════════════════════════════════════════════════════════

  - name: Draw illegal activity summary
    id: illegal_activity_summary
    task: draw_summary_dashboard
    partial:
      df: ${{ workflow.clean_data.return }}
      groupers: ${{ workflow.groupers.return }}
      category_column: "Observation Category 0"
      categories:
        - "Mangrove Logging"
        - "Poaching"
        - "Arrests"
        - "Damaging Coral"
        - "Illegal Fishing"
      filter_column: "Station"
      filter_value: "Sector"
      sum_columns:
        Poached Turtle Sum: "Sum"
      chart_title: "Illegal Activity Summary"
      n_cols: 3
      widget_id: Illegal Activity Summary

  - name: Persist illegal activity summary HTML
    id: persist_illegal_activity_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: illegal_activity_summary
      text: ${{ workflow.illegal_activity_summary.return }}

  - name: Convert illegal activity summary HTML to PNG
    id: html_to_png_illegal_activity
    task: html_to_png
    partial:
      html_path: ${{ workflow.persist_illegal_activity_html.return }}
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 1280
        # height: 800
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1

  - name: Create illegal activity summary widget
    id: illegal_activity_widget
    task: create_plot_widget_single_view
    partial:
      title: Illegal Activity Summary
      data: ${{ workflow.persist_illegal_activity_html.return }}

  # ── Illegal activity donut chart  (mapvalues — groups by grouper) ─
  - name: Draw illegal activity donut chart
    id: illegal_activity_donut
    task: draw_donut_chart
    partial:
      groupers: ${{ workflow.groupers.return }}
      category_column: "Observation Category 0"
      categories:
        - "Mangrove Logging"
        - "Poaching"
        - "Arrests"
      filter_column: "Station"
      filter_value: "Sector"
      sum_columns:
        Poached Turtle Sum: "Sum"
      chart_title: "Illegal Activities Summary"
      hole: 0.4
      plot_style:
        marker_colors:
          - "#1f77b4"
          - "#2ca02c"
          - "#ff7f0e"
          - "#d62728"
          - "#9467bd"
          - "#8c564b"
      layout_style:
        showlegend: true
        font_size: 8
        title_x: 0.5
        font_family: Arial
        font_color: black
      widget_id: Illegal Activities Donut
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_data.return }}

  - name: Persist illegal activity donut HTML
    id: persist_illegal_donut_html
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: illegal_activity_donut
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.illegal_activity_donut.return }}

  - name: Convert illegal activity donut HTML to PNG
    id: png_illegal_donut
    task: html_to_png
    partial:
      output_dir: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      config:
        # width: 900
        # height: 700
        full_page: false
        device_scale_factor: 1.0
        wait_for_timeout: 1000
        timeout: 0
        max_concurrent_pages: 1
    mapvalues:
      argnames: html_path
      argvalues: ${{ workflow.persist_illegal_donut_html.return }}

  - name: Create illegal activity donut widget
    id: illegal_activity_donut_widget
    task: create_plot_widget_single_view
    partial:
      title: Illegal Activities Donut
    mapvalues:
      argnames: data
      argvalues: ${{ workflow.persist_illegal_donut_html.return }}

  # ════════════════════════════════════════════════════════════
  # SECTION 4 — EVIDENCE BREAKDOWN  (partial — all-time)
  # ════════════════════════════════════════════════════════════

  # ── Mangrove logging evidence ─────────────────────────────
  - name: Prepare mangrove logging evidence data
    id: mangrove_evidence_data
    task: prepare_category_counts
    partial:
