  # ════════════════════════════════════════════════════════════
  # SECTION 7 — REPORT
  # ════════════════════════════════════════════════════════════
  # Report uses PNG outputs. For mapvalues tasks we take only the first
  # PNG produced (the all-data group from the Year grouper) by wiring
  # the html_to_png return directly — render_report receives a list and
  # picks index 0 internally, or you can add a pick_first task if needed.

  - name: Get report year
    id: report_year
    task: get_report_year
    partial:
      df: ${{ workflow.clean_data.return }}
      groupers: ${{ workflow.groupers.return }}

  - name: Get report generation date
    id: report_generation_date
    task: get_generation_date
    partial: {}

  - name: Render patrol summary report
    id: render_patrol_report
    task: render_report
    partial:
      template_path: ${{ workflow.report_template_input.return }}
      output_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      report_year: ${{ workflow.report_year.return }}
      generation_date: ${{ workflow.report_generation_date.return }}

      # ── Section 1: Patrol Summaries ──────────────────────
      patrol_summary_table: ${{ workflow.html_to_png_patrol_summary.return }}
      patrol_summary_line: ${{ workflow.html_to_png_patrols_chart.return }}
      hours_line_chart: ${{ workflow.html_to_png_hours_chart.return }}
      incidents_line_chart: ${{ workflow.html_to_png_incidents_chart.return }}
      village_summary_table: ${{ workflow.html_to_png_village_summary.return }}
      patrol_transport_summary: ${{ workflow.png_transport_count_chart.return }}
      illegal_activities_summary_dashboard: ${{ workflow.html_to_png_illegal_activity.return }}
      illegal_activities_doughnut: ${{ workflow.png_illegal_donut.return }}
      illegal_evidence_text: "See charts below for breakdown of illegal activity evidence."
      mangrove_evidence: ${{ workflow.png_mangrove_evidence.return }}
      poaching_evidence: ${{ workflow.png_poaching_evidence.return }}
      illegal_fishing_evidence: ${{ workflow.html_to_png_fishing_gear_chart.return }}

      # ── Section 2: Community Feedback ────────────────────
      village_stacked_bar: ${{ workflow.png_illegal_sector.return }}
      arrests_by_village_bar: ${{ workflow.png_arrests_village.return }}

      # ── Section 3: Visual Enhancement ────────────────────
      horizontal_proportional_dashboard: ${{ workflow.html_to_png_village_proportional.return }}

      # ── Section 4a: Illegal Activity Hotspot Maps ────────
      all_illegal_hotspot: ${{ workflow.html_to_png_illegal_events_map.return }}
      mangrove_logging_hotspot: ${{ workflow.html_to_png_mangrove_logging.return }}
      poaching_hotspot: ${{ workflow.html_to_png_poaching.return }}
      illegal_fishing_hotspot: ${{ workflow.html_to_png_illegal_fishing.return }}
      arrests_hotspot: ${{ workflow.html_to_png_arrests.return }}
      poached_turtles_hotspot: ${{ workflow.html_to_png_poached_turtles.return }}

      # ── Section 4b: Patrol Effort Maps ───────────────────
      weighted_effort_ecomap: ${{ workflow.html_to_png_weighted_effort_map.return }}
      standardized_rate_ecomap: ${{ workflow.html_to_png_standardized_rate.return }}
      ecograph_rate_ecomap: ${{ workflow.html_to_png_ecograph_map.return }}

      # ── Section 5: Patrol Effort Charts ──────────────────
      patrol_effort_stacked_bar: ${{ workflow.png_transport_hours_chart.return }}
      patrol_effort_line: ${{ workflow.html_to_png_patrol_effort_chart.return }}

      # ── Section 6: Comparison Features ───────────────────
      top_villages_by_category: ${{ workflow.png_top_villages_cat.return }}
      top_villages_monthly_trend: ${{ workflow.png_top_villages_month.return }}

      # ── Section 7: Violations Over Time ──────────────────
      violations_over_time_note: "Monthly illegal activity charts generated per village for the selected period."

  # ════════════════════════════════════════════════════════════
  # SECTION 8 — DASHBOARD
  # ════════════════════════════════════════════════════════════

  # Combine all mapvalues widget iterables into one keyed iterable
  - name: Merge grouped widgets
    id: grouped_widgets
    task: groupbykey
    partial:
      iterables:
        - ${{ workflow.illegal_activity_donut_widget.return }}
        - ${{ workflow.illegal_events_sector_widget.return }}
        - ${{ workflow.village_proportional_widget.return }}
        - ${{ workflow.top_villages_category_widget.return }}
        - ${{ workflow.top_villages_monthly_widget.return }}
        - ${{ workflow.village_monthly_widget.return }}
        - ${{ workflow.illegal_events_map_widget.return }}
        - ${{ workflow.weighted_effort_map_widget.return }}
        - ${{ workflow.standardized_rate_map_widget.return }}
        - ${{ workflow.ecograph_map_widget.return }}
        - ${{ workflow.mangrove_logging_map_widget.return }}
        - ${{ workflow.poaching_map_widget.return }}
        - ${{ workflow.illegal_fishing_map_widget.return }}
        - ${{ workflow.arrests_map_widget.return }}
        - ${{ workflow.poached_turtles_map_widget.return }}

  # Assemble all widgets into a flat list of GroupedWidgets for the dashboard
  - name: Assemble dashboard widgets
    id: dashboard_widgets
    task: assemble_dashboard_widgets
    partial:
      single_view_widgets:
        - ${{ workflow.patrol_summary_widget.return }}
        - ${{ workflow.patrols_chart_widget.return }}
        - ${{ workflow.hours_chart_widget.return }}
        - ${{ workflow.incidents_chart_widget.return }}
        - ${{ workflow.village_summary_widget.return }}
        - ${{ workflow.patrol_effort_widget.return }}
        - ${{ workflow.patrol_transport_count_widget.return }}
        - ${{ workflow.patrol_transport_hours_widget.return }}
        - ${{ workflow.illegal_activity_widget.return }}
        - ${{ workflow.mangrove_evidence_widget.return }}
        - ${{ workflow.poaching_evidence_widget.return }}
        - ${{ workflow.fishing_gear_widget.return }}
        - ${{ workflow.arrests_village_widget.return }}
      keyed_widgets: ${{ workflow.grouped_widgets.return }}

  - name: Patrol Summary Dashboard
    id: patrol_summary_dashboard
    task: gather_dashboard
    partial:
      widgets: ${{ workflow.dashboard_widgets.return }}
      details: ${{ workflow.workflow_details.return }}  # ← hides Details fields from UI
      groupers: ${{ workflow.groupers.return }}          # ← hides Groupers fields from UI
      time_range: ${{ workflow.time_range.return }}      # ← hides Time Range fields from UI
